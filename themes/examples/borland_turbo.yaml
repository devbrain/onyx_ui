# Borland Turbo Theme
# Classic Turbo Pascal/C++ IDE color scheme - cyan background with black text
# Reminiscent of Borland's Turbo Vision framework

name: "Borland Turbo"
description: "Turbo Pascal/C++ IDE color scheme"

# Global colors - cyan/black palette
window_bg: { r: 0, g: 170, b: 170 }      # Cyan
text_fg: { r: 0, g: 0, b: 0 }            # Black
border_color: { r: 255, g: 255, b: 0 }   # Yellow

# Button styling with visual_state bundles
button:
  # Normal state
  normal:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 0, g: 0, b: 0 }
    background: { r: 170, g: 170, b: 170 }  # Light gray

  # Hover state
  hover:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 0, g: 85, b: 85 }       # Dark cyan

  # Pressed state
  pressed:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 0, g: 0, b: 0 }         # Black

  # Disabled state
  disabled:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 85, g: 85, b: 85 }
    background: { r: 170, g: 170, b: 170 }

  mnemonic_font: { bold: false, reverse: false, underline: true }
  box_style: double_line                  # Distinctive double-line borders
  padding_horizontal: 2
  padding_vertical: 0
  text_align: center

# Label styling
label:
  text: { r: 0, g: 0, b: 0 }              # Black on cyan
  background: { r: 0, g: 170, b: 170 }
  font: { bold: false, reverse: false, underline: false }
  mnemonic_font: { bold: false, reverse: false, underline: true }

# Panel styling
panel:
  background: { r: 0, g: 170, b: 170 }    # Cyan
  border_color: { r: 255, g: 255, b: 0 }  # Yellow
  box_style: double_line
  has_border: true

# Scrollbar styling
scrollbar:
  width: 1
  min_thumb_size: 1
  style: compact

  track_normal:
    foreground: { r: 128, g: 128, b: 128 }
    background: { r: 64, g: 64, b: 64 }
    box_style: { draw_border: true }

  thumb_normal:
    foreground: { r: 192, g: 192, b: 192 }
    background: { r: 96, g: 96, b: 96 }
    box_style: { draw_border: true }

  thumb_hover:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 128, g: 128, b: 128 }
    box_style: { draw_border: true }

  thumb_pressed:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 160, g: 160, b: 160 }
    box_style: { draw_border: true }

  thumb_disabled:
    foreground: { r: 96, g: 96, b: 96 }
    background: { r: 64, g: 64, b: 64 }
    box_style: { draw_border: true }

  arrow_normal:
    foreground: { r: 192, g: 192, b: 192 }
    background: { r: 96, g: 96, b: 96 }
    box_style: { draw_border: true }

  arrow_hover:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 128, g: 128, b: 128 }
    box_style: { draw_border: true }

  arrow_pressed:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 160, g: 160, b: 160 }
    box_style: { draw_border: true }

# Progress bar styling (visual progress indicators)
progress_bar:
  filled_color: { r: 255, g: 255, b: 0 }     # Yellow filled portion
  empty_color: { r: 85, g: 85, b: 85 }       # Dark gray empty portion
  text_color: { r: 0, g: 0, b: 0 }           # Black text overlay
  text_font: { bold: false, reverse: false, underline: false }

# Slider styling (interactive value adjustment)
slider:
  track_filled_color: { r: 255, g: 255, b: 0 }  # Yellow filled track
  track_empty_color: { r: 85, g: 85, b: 85 }    # Dark gray empty track
  thumb_color: { r: 255, g: 255, b: 255 }       # White thumb/handle
  tick_color: { r: 170, g: 170, b: 170 }        # Light gray tick marks
