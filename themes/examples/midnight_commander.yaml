# Midnight Commander Theme
# MC file manager color scheme - dark blue with yellow text
# Classic two-panel file manager aesthetic

name: "Midnight Commander"
description: "MC file manager color scheme"

# Global colors - dark blue/yellow palette
window_bg: { r: 0, g: 0, b: 85 }         # Dark blue
text_fg: { r: 255, g: 255, b: 85 }       # Light yellow
border_color: { r: 170, g: 170, b: 170 } # Gray

# Button styling with visual_state bundles
button:
  # Normal state
  normal:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 0, g: 0, b: 0 }
    background: { r: 0, g: 170, b: 170 }    # Cyan buttons

  # Hover state
  hover:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 0, g: 85, b: 85 }       # Dark cyan

  # Pressed state
  pressed:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 0, g: 0, b: 0 }
    background: { r: 255, g: 255, b: 0 }    # Yellow when pressed

  # Disabled state
  disabled:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 85, g: 85, b: 85 }
    background: { r: 0, g: 170, b: 170 }

  mnemonic_font: { bold: false, reverse: false, underline: true }
  box_style: single_line
  padding_horizontal: 2
  padding_vertical: 0
  text_align: center

# Label styling
label:
  text: { r: 255, g: 255, b: 85 }         # Yellow text
  background: { r: 0, g: 0, b: 85 }       # Dark blue background
  font: { bold: false, reverse: false, underline: false }
  mnemonic_font: { bold: false, reverse: false, underline: true }

# Panel styling
panel:
  background: { r: 0, g: 0, b: 85 }       # Dark blue
  border_color: { r: 170, g: 170, b: 170 } # Gray
  box_style: single_line
  has_border: true

# Scrollbar styling
scrollbar:
  width: 1
  min_thumb_size: 1
  style: compact

  track_normal:
    foreground: { r: 128, g: 128, b: 128 }
    background: { r: 64, g: 64, b: 64 }
    box_style: { draw_border: true }

  thumb_normal:
    foreground: { r: 192, g: 192, b: 192 }
    background: { r: 96, g: 96, b: 96 }
    box_style: { draw_border: true }

  thumb_hover:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 128, g: 128, b: 128 }
    box_style: { draw_border: true }

  thumb_pressed:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 160, g: 160, b: 160 }
    box_style: { draw_border: true }

  thumb_disabled:
    foreground: { r: 96, g: 96, b: 96 }
    background: { r: 64, g: 64, b: 64 }
    box_style: { draw_border: true }

  arrow_normal:
    foreground: { r: 192, g: 192, b: 192 }
    background: { r: 96, g: 96, b: 96 }
    box_style: { draw_border: true }

  arrow_hover:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 128, g: 128, b: 128 }
    box_style: { draw_border: true }

  arrow_pressed:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 160, g: 160, b: 160 }
    box_style: { draw_border: true }
