# Norton Blue Theme
# Classic Norton Utilities color scheme - dark blue background with white text
# Reminiscent of Norton Commander, Norton Utilities, and similar DOS tools

name: "Norton Blue"
description: "Classic Norton Utilities color scheme"

# Global colors
window_bg:
  r: 0
  g: 0
  b: 170  # Dark blue

text_fg:
  r: 255
  g: 255
  b: 255  # White

border_color:
  r: 255
  g: 255
  b: 0  # Yellow

# Button styling with visual_state bundles
button:
  # Normal state
  normal:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 255 }  # White on dark blue
    background: { r: 0, g: 0, b: 170 }

  # Hover state
  hover:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 0 }    # Yellow on bright blue
    background: { r: 0, g: 0, b: 255 }

  # Pressed state
  pressed:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 0, g: 0, b: 0 }        # Black on light gray
    background: { r: 170, g: 170, b: 170 }

  # Disabled state
  disabled:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 85, g: 85, b: 85 }     # Dark gray on dark blue
    background: { r: 0, g: 0, b: 170 }

  mnemonic_font: { bold: false, reverse: false, underline: true }
  box_style: single_line
  padding_horizontal: 2
  padding_vertical: 0
  text_align: center

# Label styling
label:
  text: { r: 255, g: 255, b: 255 }         # White
  background: { r: 0, g: 0, b: 170 }       # Dark blue
  font: { bold: false, reverse: false, underline: false }
  mnemonic_font: { bold: false, reverse: false, underline: true }

# Panel styling
panel:
  background: { r: 0, g: 0, b: 170 }       # Dark blue
  border_color: { r: 255, g: 255, b: 0 }   # Yellow
  box_style: single_line
  has_border: true
