# Norton Blue Theme
# Classic Norton Utilities color scheme - dark blue background with white text
# Reminiscent of Norton Commander, Norton Utilities, and similar DOS tools

name: "Norton Blue"
description: "Classic Norton Utilities color scheme"

# Global colors
window_bg:
  r: 0
  g: 0
  b: 170  # Dark blue

text_fg:
  r: 255
  g: 255
  b: 255  # White

border_color:
  r: 255
  g: 255
  b: 0  # Yellow

# Button styling with visual_state bundles
button:
  # Normal state
  normal:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 255 }  # White on dark blue
    background: { r: 0, g: 0, b: 170 }

  # Hover state
  hover:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 0 }    # Yellow on bright blue
    background: { r: 0, g: 0, b: 255 }

  # Pressed state
  pressed:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 0, g: 0, b: 0 }        # Black on light gray
    background: { r: 170, g: 170, b: 170 }

  # Disabled state
  disabled:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 85, g: 85, b: 85 }     # Dark gray on dark blue
    background: { r: 0, g: 0, b: 170 }

  mnemonic_font: { bold: false, reverse: false, underline: true }
  box_style: single_line
  padding_horizontal: 2
  padding_vertical: 0
  text_align: center

# Label styling
label:
  text: { r: 255, g: 255, b: 255 }         # White
  background: { r: 0, g: 0, b: 170 }       # Dark blue
  font: { bold: false, reverse: false, underline: false }
  mnemonic_font: { bold: false, reverse: false, underline: true }

# Line Edit styling (text input widgets)
line_edit:
  text: { r: 255, g: 255, b: 255 }         # White text
  background: { r: 0, g: 0, b: 170 }       # Dark blue background
  border_color: { r: 255, g: 255, b: 0 }   # Yellow border
  placeholder_text: { r: 170, g: 170, b: 170 }  # Light gray for placeholder
  cursor: { r: 255, g: 255, b: 0 }         # Yellow cursor
  box_style: single_line                   # Single-line border
  font: { bold: false, reverse: false, underline: false }
  padding_horizontal: 1
  padding_vertical: 0
  cursor_insert_icon: cursor_insert        # Vertical bar │ for insert mode
  cursor_overwrite_icon: cursor_overwrite  # Block █ for overwrite mode
  cursor_blink_interval_ms: 500            # Cursor blink interval (500ms = 0.5s on/off)

# Checkbox styling (toggleable boolean input)
checkbox:
  # Normal state (unchecked)
  normal:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 255 }  # White text
    background: { r: 0, g: 0, b: 170 }      # Dark blue

  # Hover state
  hover:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 0 }    # Yellow text
    background: { r: 0, g: 0, b: 255 }      # Bright blue

  # Checked state
  checked:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 0 }    # Yellow text (highlight checked)
    background: { r: 0, g: 0, b: 170 }      # Dark blue

  # Disabled state
  disabled:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 85, g: 85, b: 85 }     # Dark gray
    background: { r: 0, g: 0, b: 170 }      # Dark blue

  mnemonic_font: { bold: false, reverse: false, underline: true }
  unchecked_icon: checkbox_unchecked       # [ ] unchecked box
  checked_icon: checkbox_checked           # [X] checked box
  indeterminate_icon: checkbox_indeterminate  # [-] indeterminate box
  spacing: 1                               # Space between box and text

# Radio button styling (mutually exclusive selection)
radio_button:
  # Normal state (unchecked)
  normal:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 255 }  # White text
    background: { r: 0, g: 0, b: 170 }      # Dark blue

  # Hover state
  hover:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 0 }    # Yellow text
    background: { r: 0, g: 0, b: 255 }      # Bright blue

  # Checked state
  checked:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 0 }    # Yellow text (highlight selected)
    background: { r: 0, g: 0, b: 170 }      # Dark blue

  # Disabled state
  disabled:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 85, g: 85, b: 85 }     # Dark gray
    background: { r: 0, g: 0, b: 170 }      # Dark blue

  mnemonic_font: { bold: false, reverse: false, underline: true }
  unchecked_icon: radio_unchecked          # ( ) unchecked button
  checked_icon: radio_checked              # (*) checked button
  spacing: 1                               # Space between icon and text

# Progress bar styling (visual progress indicators)
progress_bar:
  filled_color: { r: 255, g: 255, b: 0 }   # Yellow filled portion
  empty_color: { r: 85, g: 85, b: 85 }     # Dark gray empty portion
  text_color: { r: 255, g: 255, b: 255 }   # White text overlay
  text_font: { bold: false, reverse: false, underline: false }
  filled_icon: progress_filled             # # character for filled portion
  empty_icon: progress_empty               # . character for empty portion

# Slider styling (interactive value adjustment)
slider:
  track_filled_color: { r: 255, g: 255, b: 0 }    # Yellow filled track
  track_empty_color: { r: 85, g: 85, b: 85 }      # Dark gray empty track
  thumb_color: { r: 255, g: 255, b: 255 }         # White thumb/handle
  tick_color: { r: 170, g: 170, b: 170 }          # Light gray tick marks
  filled_icon: slider_filled                       # = character for filled track
  empty_icon: slider_empty                         # - character for empty track
  thumb_icon: slider_thumb                         # O character for thumb

# Panel styling
panel:
  background: { r: 0, g: 0, b: 170 }       # Dark blue
  border_color: { r: 255, g: 255, b: 0 }   # Yellow
  box_style: single_line
  has_border: true

# Scrollbar styling
scrollbar:
  width: 1                                  # Scrollbar thickness (columns/rows)
  min_thumb_size: 1                         # Minimum thumb size
  style: classic                            # Arrow button style (classic/compact/minimal)

  # Track (background bar)
  track_normal:
    foreground: { r: 85, g: 85, b: 85 }    # Dark gray
    background: { r: 0, g: 0, b: 170 }      # Dark blue
    box_style: { draw_border: true }

  # Thumb (draggable indicator) states
  thumb_normal:
    foreground: { r: 170, g: 170, b: 170 } # Light gray
    background: { r: 0, g: 0, b: 170 }      # Dark blue
    box_style: { draw_border: true }

  thumb_hover:
    foreground: { r: 255, g: 255, b: 0 }   # Yellow (highlight)
    background: { r: 0, g: 0, b: 255 }      # Bright blue
    box_style: { draw_border: true }

  thumb_pressed:
    foreground: { r: 0, g: 0, b: 0 }       # Black
    background: { r: 255, g: 255, b: 255 } # White
    box_style: { draw_border: true }

  thumb_disabled:
    foreground: { r: 64, g: 64, b: 64 }    # Very dark gray
    background: { r: 0, g: 0, b: 170 }      # Dark blue
    box_style: { draw_border: true }

  # Arrow buttons (classic/compact styles)
  arrow_normal:
    foreground: { r: 255, g: 255, b: 255 } # White
    background: { r: 0, g: 0, b: 170 }      # Dark blue
    box_style: { draw_border: true }

  arrow_hover:
    foreground: { r: 255, g: 255, b: 0 }   # Yellow
    background: { r: 0, g: 0, b: 255 }      # Bright blue
    box_style: { draw_border: true }

  arrow_pressed:
    foreground: { r: 0, g: 0, b: 0 }       # Black
    background: { r: 170, g: 170, b: 170 } # Light gray
    box_style: { draw_border: true }
