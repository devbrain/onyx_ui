# High Contrast Theme
# Accessibility-focused theme with maximum contrast for visually impaired users
# Black and white with bold borders

name: "High Contrast"
description: "High contrast theme for accessibility"

# Global colors - pure black and white
window_bg: { r: 0, g: 0, b: 0 }          # Pure black
text_fg: { r: 255, g: 255, b: 255 }      # Pure white
border_color: { r: 255, g: 255, b: 255 } # White borders

# Button styling - maximum contrast with visual_state bundles
button:
  # Normal state: white on black with bold font
  normal:
    font: { bold: true, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 0, g: 0, b: 0 }

  # Hover state: black on white (inverted)
  hover:
    font: { bold: true, reverse: false, underline: false }
    foreground: { r: 0, g: 0, b: 0 }
    background: { r: 255, g: 255, b: 255 }

  # Pressed state: white on dark gray
  pressed:
    font: { bold: true, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 64, g: 64, b: 64 }

  # Disabled state: gray on black
  disabled:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 128, g: 128, b: 128 }
    background: { r: 0, g: 0, b: 0 }

  mnemonic_font: { bold: true, reverse: false, underline: true }
  box_style: heavy                        # Heavy borders for better visibility
  padding_horizontal: 3                   # Extra padding for better touch targets
  padding_vertical: 1
  text_align: center

# Label styling - high contrast
label:
  text: { r: 255, g: 255, b: 255 }       # White text
  background: { r: 0, g: 0, b: 0 }       # Black background
  font: { bold: true, reverse: false, underline: false }
  mnemonic_font: { bold: true, reverse: false, underline: true }

# Panel styling - bold borders
panel:
  background: { r: 0, g: 0, b: 0 }       # Black
  border_color: { r: 255, g: 255, b: 255 } # White
  box_style: heavy                        # Heavy borders for visibility
  has_border: true

# Scrollbar styling
scrollbar:
  width: 1
  min_thumb_size: 1
  style: compact

  track_normal:
    foreground: { r: 128, g: 128, b: 128 }
    background: { r: 64, g: 64, b: 64 }
    box_style: { draw_border: true }

  thumb_normal:
    foreground: { r: 192, g: 192, b: 192 }
    background: { r: 96, g: 96, b: 96 }
    box_style: { draw_border: true }

  thumb_hover:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 128, g: 128, b: 128 }
    box_style: { draw_border: true }

  thumb_pressed:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 160, g: 160, b: 160 }
    box_style: { draw_border: true }

  thumb_disabled:
    foreground: { r: 96, g: 96, b: 96 }
    background: { r: 64, g: 64, b: 64 }
    box_style: { draw_border: true }

  arrow_normal:
    foreground: { r: 192, g: 192, b: 192 }
    background: { r: 96, g: 96, b: 96 }
    box_style: { draw_border: true }

  arrow_hover:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 128, g: 128, b: 128 }
    box_style: { draw_border: true }

  arrow_pressed:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 160, g: 160, b: 160 }
    box_style: { draw_border: true }

# Progress bar styling (visual progress indicators)
progress_bar:
  filled_color: { r: 255, g: 255, b: 255 }   # White filled portion
  empty_color: { r: 0, g: 0, b: 0 }          # Black empty portion
  text_color: { r: 0, g: 0, b: 0 }           # Black text overlay (inverted on white)
  text_font: { bold: true, reverse: false, underline: false }

# Slider styling (interactive value adjustment)
slider:
  track_filled_color: { r: 255, g: 255, b: 255 }  # White filled track
  track_empty_color: { r: 0, g: 0, b: 0 }         # Black empty track
  thumb_color: { r: 128, g: 128, b: 128 }         # Medium gray thumb/handle
  tick_color: { r: 192, g: 192, b: 192 }          # Light gray tick marks
