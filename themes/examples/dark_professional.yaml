# Dark Professional Theme
# Modern dark theme with muted colors - inspired by VS Code Dark+
# Professional look with good contrast

name: "Dark Professional"
description: "Modern dark theme for professional use"

# Global colors - dark gray with light text
window_bg: { r: 30, g: 30, b: 30 }       # Very dark gray (not pure black)
text_fg: { r: 220, g: 220, b: 220 }      # Light gray (not pure white)
border_color: { r: 80, g: 80, b: 80 }    # Medium gray

# Button styling - modern accent colors with visual_state bundles
button:
  # Normal state: light text on dark background
  normal:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 220, g: 220, b: 220 }
    background: { r: 45, g: 45, b: 45 }     # Slightly lighter than window

  # Hover state: white text with blue accent
  hover:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 0, g: 120, b: 215 }     # Modern blue

  # Pressed state: white on darker blue
  pressed:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 0, g: 90, b: 165 }

  # Disabled state: dark gray
  disabled:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 100, g: 100, b: 100 }
    background: { r: 45, g: 45, b: 45 }

  mnemonic_font: { bold: false, reverse: false, underline: true }
  box_style: rounded                      # Modern rounded corners
  padding_horizontal: 2
  padding_vertical: 0
  text_align: center

# Label styling
label:
  text: { r: 220, g: 220, b: 220 }       # Light gray
  background: { r: 30, g: 30, b: 30 }    # Dark gray
  font: { bold: false, reverse: false, underline: false }
  mnemonic_font: { bold: false, reverse: false, underline: true }

# Panel styling - subtle borders
panel:
  background: { r: 37, g: 37, b: 37 }    # Slightly lighter than window
  border_color: { r: 80, g: 80, b: 80 }  # Subtle gray border
  box_style: rounded
  has_border: true

# Scrollbar styling - modern minimal design
scrollbar:
  width: 1                                  # Scrollbar thickness
  min_thumb_size: 1                         # Minimum thumb size
  style: minimal                            # Minimal style (no arrow buttons)

  # Track (background bar)
  track_normal:
    foreground: { r: 60, g: 60, b: 60 }    # Dark gray
    background: { r: 30, g: 30, b: 30 }     # Very dark gray
    box_style: { draw_border: true }

  # Thumb (draggable indicator) states
  thumb_normal:
    foreground: { r: 100, g: 100, b: 100 } # Medium gray
    background: { r: 45, g: 45, b: 45 }     # Slightly lighter
    box_style: { draw_border: true }

  thumb_hover:
    foreground: { r: 0, g: 120, b: 215 }   # Modern blue
    background: { r: 60, g: 60, b: 60 }     # Dark gray
    box_style: { draw_border: true }

  thumb_pressed:
    foreground: { r: 255, g: 255, b: 255 } # White
    background: { r: 0, g: 90, b: 180 }     # Darker blue
    box_style: { draw_border: true }

  thumb_disabled:
    foreground: { r: 50, g: 50, b: 50 }    # Very dark gray
    background: { r: 35, g: 35, b: 35 }     # Almost black
    box_style: { draw_border: true }

  # Arrow buttons (not used in minimal style)
  arrow_normal:
    foreground: { r: 100, g: 100, b: 100 }
    background: { r: 45, g: 45, b: 45 }
    box_style: { draw_border: true }

  arrow_hover:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 0, g: 120, b: 215 }
    box_style: { draw_border: true }

  arrow_pressed:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 0, g: 90, b: 180 }
    box_style: { draw_border: true }

# Progress bar styling (visual progress indicators)
progress_bar:
  filled_color: { r: 0, g: 120, b: 215 }    # Modern blue filled portion
  empty_color: { r: 60, g: 60, b: 60 }      # Dark gray empty portion
  text_color: { r: 255, g: 255, b: 255 }    # White text overlay
  text_font: { bold: false, reverse: false, underline: false }

# Slider styling (interactive value adjustment)
slider:
  track_filled_color: { r: 0, g: 120, b: 215 }   # Modern blue filled track
  track_empty_color: { r: 60, g: 60, b: 60 }     # Dark gray empty track
  thumb_color: { r: 255, g: 255, b: 255 }        # White thumb/handle
  tick_color: { r: 100, g: 100, b: 100 }         # Medium gray tick marks
