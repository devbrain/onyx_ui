# Minimal Blue - Phase 4 Smart Defaults Demo
# This theme defines only 3 colors, and Phase 4 automatically generates
# all widget states, hover effects, pressed states, disabled states, etc.
#
# Compare: Full themes are 118+ lines, this is just 9 lines!

name: "Minimal Blue"
description: "Truly minimal theme with only 3 colors - Phase 4 generates the rest!"

# Only 3 colors needed - Phase 4 generates 50+ values from these!
window_bg: 0x0000AA      # Dark blue background
text_fg: 0xFFFFFF        # White text
border_color: 0xFFFF00   # Yellow accents/borders

# That's it! Phase 4 auto-generates:
# - Button states (normal, hover, pressed, disabled)
# - Label styles (text, background)
# - Panel styles (background, border)
# - Menu styles (background, border, items, bar items)
# - Menu item states (normal, highlighted, disabled, shortcut hints)
# - Scrollbar components (track, thumb, arrows, hover states)
# - All hover effects (lightened backgrounds, bold fonts, accent colors)
# - All pressed effects (inverted colors)
# - All disabled effects (darkened/dimmed colors)
