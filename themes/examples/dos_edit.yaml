# DOS Edit Theme
# MS-DOS Edit text editor color scheme - light gray background with black text
# Classic MS-DOS 5.0+ text editor look

name: "DOS Edit"
description: "MS-DOS Edit text editor colors"

# Global colors - light gray/black palette
window_bg: { r: 170, g: 170, b: 170 }    # Light gray
text_fg: { r: 0, g: 0, b: 0 }            # Black
border_color: { r: 85, g: 85, b: 85 }    # Dark gray

# Button styling with visual_state bundles
button:
  # Normal state
  normal:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 0, g: 0, b: 0 }
    background: { r: 170, g: 170, b: 170 }  # Gray

  # Hover state
  hover:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 255, g: 255, b: 255 }  # White on black
    background: { r: 0, g: 0, b: 0 }

  # Pressed state
  pressed:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 0, g: 0, b: 0 }        # Black on white
    background: { r: 255, g: 255, b: 255 }

  # Disabled state
  disabled:
    font: { bold: false, reverse: false, underline: false }
    foreground: { r: 85, g: 85, b: 85 }     # Dark gray
    background: { r: 170, g: 170, b: 170 }

  mnemonic_font: { bold: false, reverse: false, underline: true }
  box_style: single_line
  padding_horizontal: 2
  padding_vertical: 0
  text_align: center

# Label styling
label:
  text: { r: 0, g: 0, b: 0 }              # Black text
  background: { r: 170, g: 170, b: 170 }  # Gray background
  font: { bold: false, reverse: false, underline: false }
  mnemonic_font: { bold: false, reverse: false, underline: true }

# Panel styling
panel:
  background: { r: 170, g: 170, b: 170 }  # Gray
  border_color: { r: 85, g: 85, b: 85 }   # Dark gray
  box_style: single_line
  has_border: true

# Scrollbar styling
scrollbar:
  width: 1
  min_thumb_size: 1
  style: compact

  track_normal:
    foreground: { r: 128, g: 128, b: 128 }
    background: { r: 64, g: 64, b: 64 }
    box_style: { draw_border: true }

  thumb_normal:
    foreground: { r: 192, g: 192, b: 192 }
    background: { r: 96, g: 96, b: 96 }
    box_style: { draw_border: true }

  thumb_hover:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 128, g: 128, b: 128 }
    box_style: { draw_border: true }

  thumb_pressed:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 160, g: 160, b: 160 }
    box_style: { draw_border: true }

  thumb_disabled:
    foreground: { r: 96, g: 96, b: 96 }
    background: { r: 64, g: 64, b: 64 }
    box_style: { draw_border: true }

  arrow_normal:
    foreground: { r: 192, g: 192, b: 192 }
    background: { r: 96, g: 96, b: 96 }
    box_style: { draw_border: true }

  arrow_hover:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 128, g: 128, b: 128 }
    box_style: { draw_border: true }

  arrow_pressed:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 160, g: 160, b: 160 }
    box_style: { draw_border: true }
