# Gruvbox Dark Theme
# A retro groove color scheme designed by Pavel Pertsev (morhetz)
# Features warm, muted colors inspired by vintage computers
# Designed for long coding sessions with reduced eye strain
# Repository: https://github.com/morhetz/gruvbox

name: "Gruvbox Dark"
description: "Retro groove theme with warm, muted colors"

# Gruvbox dark color palette (hard variant)
# Background: #1d2021 (hard dark)
# Foreground: #ebdbb2 (light beige)
# Dark colors: #282828 (bg), #3c3836 (bg1), #504945 (bg2), #665c54 (bg3)
# Light colors: #fbf1c7 (fg0), #ebdbb2 (fg), #d5c4a1 (fg2), #bdae93 (fg3)
# Red: #fb4934, Green: #b8bb26, Yellow: #fabd2f, Blue: #83a598
# Purple: #d3869b, Aqua: #8ec07c, Orange: #fe8019

# Global colors
window_bg:
  r: 29   # #1d2021 - Hard dark background
  g: 32
  b: 33

text_fg:
  r: 235  # #ebdbb2 - Light beige
  g: 219
  b: 178

border_color:
  r: 142  # #8ec07c - Aqua
  g: 192
  b: 124

# Button styling
button:
  fg_normal: { r: 235, g: 219, b: 178 }   # Light beige on dark bg
  bg_normal: { r: 40, g: 40, b: 40 }      # #282828

  fg_hover: { r: 29, g: 32, b: 33 }       # Dark on aqua
  bg_hover: { r: 142, g: 192, b: 124 }    # Aqua

  fg_pressed: { r: 29, g: 32, b: 33 }     # Dark on yellow
  bg_pressed: { r: 250, g: 189, b: 47 }   # Yellow

  fg_disabled: { r: 146, g: 131, b: 116 } # #928374 - Gray on dark
  bg_disabled: { r: 29, g: 32, b: 33 }

  box_style: single_line
  padding_horizontal: 2
  padding_vertical: 0
  text_align: center

  font:
    bold: false
    reverse: false
    underline: false

  mnemonic_font:
    bold: true
    reverse: false
    underline: false

# Label styling
label:
  text: { r: 184, g: 187, b: 38 }         # #b8bb26 - Green
  background: { r: 29, g: 32, b: 33 }     # Hard dark bg

  font:
    bold: false
    reverse: false
    underline: false

  mnemonic_font:
    bold: true
    reverse: false
    underline: false

# Panel styling
panel:
  background: { r: 29, g: 32, b: 33 }     # Hard dark bg
  border_color: { r: 142, g: 192, b: 124 } # Aqua
  box_style: single_line
  has_border: true

# Scrollbar styling
scrollbar:
  width: 1
  min_thumb_size: 1
  style: compact

  track_normal:
    foreground: { r: 128, g: 128, b: 128 }
    background: { r: 64, g: 64, b: 64 }
    box_style: { draw_border: true }

  thumb_normal:
    foreground: { r: 192, g: 192, b: 192 }
    background: { r: 96, g: 96, b: 96 }
    box_style: { draw_border: true }

  thumb_hover:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 128, g: 128, b: 128 }
    box_style: { draw_border: true }

  thumb_pressed:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 160, g: 160, b: 160 }
    box_style: { draw_border: true }

  thumb_disabled:
    foreground: { r: 96, g: 96, b: 96 }
    background: { r: 64, g: 64, b: 64 }
    box_style: { draw_border: true }

  arrow_normal:
    foreground: { r: 192, g: 192, b: 192 }
    background: { r: 96, g: 96, b: 96 }
    box_style: { draw_border: true }

  arrow_hover:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 128, g: 128, b: 128 }
    box_style: { draw_border: true }

  arrow_pressed:
    foreground: { r: 255, g: 255, b: 255 }
    background: { r: 160, g: 160, b: 160 }
    box_style: { draw_border: true }

# Progress bar styling (visual progress indicators)
progress_bar:
  filled_color: { r: 250, g: 189, b: 47 }    # Gruvbox yellow #fabd2f
  empty_color: { r: 60, g: 56, b: 54 }       # Gruvbox bg1 #3c3836
  text_color: { r: 235, g: 219, b: 178 }     # Gruvbox fg #ebdbb2
  text_font: { bold: false, reverse: false, underline: false }

# Slider styling (interactive value adjustment)
slider:
  track_filled_color: { r: 250, g: 189, b: 47 }  # Gruvbox yellow
  track_empty_color: { r: 60, g: 56, b: 54 }     # Gruvbox bg1
  thumb_color: { r: 254, g: 128, b: 25 }         # Gruvbox orange #fe8019
  tick_color: { r: 189, g: 174, b: 147 }         # Gruvbox fg3 #bdae93
